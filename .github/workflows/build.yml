name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

# 设置环境变量以使用 Node.js 24（避免 Node.js 20 弃用警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. 检出代码（使用 v5 支持 Node.js 24）
    - uses: actions/checkout@v5
    
    # 2. 设置 Java 环境（Flutter Android 构建需要）
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
    
    # 3. 设置 Flutter 环境（使用 v3 支持 Node.js 24）
    - name: Setup Flutter
      uses: subosito/flutter-action@v3
      with:
        flutter-version: '3.x'
        channel: 'stable'
        cache: true
    
    # 4. 获取依赖
    - name: Get dependencies
      run: flutter pub get
    
    # 5. 分析代码（可选）
    - name: Analyze
      run: flutter analyze
    
    # 6. 运行测试（如果有）
    - name: Run tests
      run: flutter test || true
    
    # 7. 构建 APK
    - name: Build APK
      run: flutter build apk --release
    
    # 8. 上传 APK 产物
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
